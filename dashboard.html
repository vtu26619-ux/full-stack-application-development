<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Logic Academy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (min-width: 900px) {
            .dashboard-container {
                grid-template-columns: 3fr 1fr;
            }
        }
        
        .section-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .my-courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .instructor-panel {
            display: none; /* Shown only to instructors via JS */
        }
        
        .empty-state {
            padding: 3rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            border: 1px dashed var(--border);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html"><span>Logic</span>Academy</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
        </ul>
        <div class="auth-buttons" id="auth-buttons"></div>
    </nav>

    <main>
        <div class="dashboard-container">
            <!-- Left Column: Purchased Courses -->
            <div class="main-content">
                <div class="glass-card">
                    <div class="section-header">
                        <h2>My Learning</h2>
                        <p class="text-muted" id="welcomeMessage">Welcome back!</p>
                    </div>

                    <div id="loader" class="loading-container">
                        <div class="loader"></div>
                    </div>

                    <div id="errorContainer" class="form-error" style="text-align: center; margin-bottom: 1rem;"></div>

                    <div id="myCoursesGrid" class="my-courses-grid" style="display: none;">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Instructor Tools (Conditional) -->
            <div class="instructor-panel" id="instructorPanel">
                <div class="glass-card">
                    <div class="section-header">
                        <h3>Instructor Tools</h3>
                        <p class="text-muted">Create a new course</p>
                    </div>
                    
                    <form id="createCourseForm">
                        <div class="form-group">
                            <label for="title">Course Title</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="price">Price ($)</label>
                            <input type="number" id="price" class="form-control" min="0" step="0.01" required>
                        </div>
                        <div id="createError" class="form-error"></div>
                        <div id="createSuccess" style="color: #10b981; font-size: 0.85rem; margin-top: 0.5rem; display: none;">Course created successfully!</div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Publish Course</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Logic Academy Marketplace. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
